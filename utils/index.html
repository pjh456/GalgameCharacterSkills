<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galgame Character Skills</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }
        
        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #e2e8f0;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }
        
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #f7fafc;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
        }
        
        .form-input::placeholder {
            color: #a0aec0;
        }
        
        textarea.form-input {
            min-height: 120px;
            resize: vertical;
            font-family: inherit;
        }
        
        select.form-input {
            cursor: pointer;
        }
        
        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: transparent;
            color: #667eea;
            border: 2px solid #667eea;
        }
        
        .btn-secondary:hover {
            background: #667eea;
            color: white;
        }
        
        .checkpoint-item {
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            margin-bottom: 8px;
            background: #f7fafc;
        }
        
        .checkpoint-item .ckpt-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        
        .checkpoint-item .ckpt-type {
            font-weight: 600;
            color: #2d3748;
            font-size: 0.9rem;
        }
        
        .checkpoint-item .ckpt-status {
            font-size: 0.8rem;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 600;
        }
        
        .ckpt-status.running { background: #fefcbf; color: #975a16; }
        .ckpt-status.failed { background: #fed7d7; color: #c53030; }
        .ckpt-status.completed { background: #c6f6d5; color: #276749; }
        
        .checkpoint-item .ckpt-info {
            font-size: 0.82rem;
            color: #718096;
            margin-bottom: 8px;
        }
        
        .checkpoint-item .ckpt-actions {
            display: flex;
            gap: 8px;
        }
        
        .ckpt-actions .btn-sm {
            padding: 4px 12px;
            font-size: 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            font-weight: 600;
        }
        
        .ckpt-actions .btn-resume {
            background: #667eea;
            color: white;
        }
        
        .ckpt-actions .btn-resume:hover { background: #5a67d8; }
        
        .ckpt-actions .btn-delete {
            background: #e2e8f0;
            color: #4a5568;
        }
        
        .ckpt-actions .btn-delete:hover { background: #fc8181; color: white; }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }
        
        .token-info {
            background: #edf2f7;
            padding: 16px 20px;
            border-radius: 10px;
            font-size: 0.95rem;
            color: #2d3748;
            font-weight: 600;
            margin-top: 16px;
        }
        
        .token-info.empty {
            background: #f7fafc;
            color: #718096;
            font-weight: normal;
        }
        
        .log-container {
            background: #1a202c;
            border-radius: 12px;
            padding: 20px;
            margin-top: 24px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .log-title {
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 16px;
        }
        
        .log-content {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.85rem;
            line-height: 1.7;
            color: #e2e8f0;
        }
        
        .log-line {
            margin-bottom: 4px;
            padding: 2px 0;
        }
        
        .log-line.success { color: #48bb78; }
        .log-line.error { color: #f56565; }
        .log-line.warning { color: #ed8936; }
        .log-line.info { color: #63b3ed; }
        
        .flex-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid #e2e8f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .btn.loading .spinner {
            display: inline-block;
        }
        
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 0.95rem;
        }
        
        .alert-success {
            background: #c6f6d5;
            color: #22543d;
            border: 1px solid #9ae6b4;
        }
        
        .alert-error {
            background: #fed7d7;
            color: #742a2a;
            border: 1px solid #fc8181;
        }
        
        .description {
            color: #718096;
            font-size: 0.9rem;
            margin-bottom: 16px;
        }
        
        .auto-scan-status {
            font-size: 0.85rem;
            color: #718096;
            margin-top: 8px;
        }
        
        .auto-scan-status.active {
            color: #48bb78;
        }
        
        .mode-switch-container {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            padding: 16px;
            background: #f7fafc;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
        }
        
        .mode-switch-label {
            font-weight: 600;
            color: #4a5568;
            font-size: 0.95rem;
        }
        
        .mode-switch {
            display: flex;
            background: #e2e8f0;
            border-radius: 10px;
            padding: 4px;
            gap: 4px;
        }
        
        .mode-option {
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            color: #718096;
        }
        
        .mode-option:hover {
            color: #4a5568;
        }
        
        .mode-option.active {
            background: white;
            color: #667eea;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .mode-description {
            font-size: 0.85rem;
            color: #718096;
            margin-left: auto;
        }
        
        .file-list {
            max-height: 250px;
            overflow-y: auto;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            background: #f7fafc;
            padding: 8px;
        }
        
        .file-list-empty {
            padding: 20px;
            text-align: center;
            color: #a0aec0;
            font-size: 0.9rem;
        }
        
        .file-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            margin-bottom: 4px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: white;
            border: 2px solid transparent;
        }
        
        .file-item:hover {
            background: #edf2f7;
            border-color: #cbd5e0;
        }
        
        .file-item.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }
        
        .file-item.selected:hover {
            opacity: 0.9;
        }
        
        .file-order {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #667eea;
            color: white;
            font-size: 0.75rem;
            font-weight: 700;
            margin-right: 12px;
            flex-shrink: 0;
        }
        
        .file-item.selected .file-order {
            background: white;
            color: #667eea;
        }
        
        .file-name {
            flex: 1;
            font-size: 0.9rem;
            word-break: break-all;
        }
        
        .file-token-count {
            font-size: 0.8rem;
            color: #718096;
            margin-left: 8px;
            flex-shrink: 0;
        }
        
        .file-item.selected .file-token-count {
            color: rgba(255,255,255,0.8);
        }
        
        .selected-files-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding: 12px 16px;
            background: #edf2f7;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #4a5568;
        }
        
        .btn-small {
            padding: 6px 14px;
            font-size: 0.85rem;
        }
        
        .vndb-section {
            background: #f7fafc;
            padding: 16px;
            border-radius: 10px;
            margin-top: 16px;
        }
        
        .vndb-info {
            margin-top: 12px;
            padding: 12px;
            background: white;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .vndb-info-item {
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        
        .vndb-info-label {
            font-weight: 600;
            color: #4a5568;
        }
        
        .vndb-info-value {
            color: #2d3748;
        }
        
        .hidden {
            display: none !important;
        }
        
        .section-divider {
            border-top: 1px solid #e2e8f0;
            margin: 20px 0;
        }
        
        .optional-label::after {
            content: " (可选)";
            color: #718096;
            font-weight: normal;
            font-size: 0.85rem;
        }
        
        .compression-switch {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: #f7fafc;
            border-radius: 10px;
            border: 2px solid #e2e8f0;
            margin-top: 16px;
        }
        
        .compression-switch-label {
            font-weight: 600;
            color: #4a5568;
            font-size: 0.95rem;
        }
        
        .compression-options {
            display: flex;
            gap: 8px;
        }
        
        .compression-option {
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            color: #718096;
            background: #e2e8f0;
            border: 2px solid transparent;
        }
        
        .compression-option:hover {
            color: #4a5568;
            background: #cbd5e0;
        }
        
        .compression-option.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }
        
        .compression-description {
            font-size: 0.8rem;
            color: #718096;
            margin-left: auto;
            max-width: 300px;
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Galgame Character Skills</h1>
            <p>将文档转换为结构化角色技能或SillyTavern角色卡</p>
        </div>
        
        <div class="card">
            <h2 class="card-title">配置</h2>
            <div class="form-group">
                <label class="form-label">Base URL</label>
                <input type="text" class="form-input" id="baseurl" placeholder="">
            </div>
            <div class="form-group">
                <label class="form-label">模型名称</label>
                <input type="text" class="form-input" id="modelname" placeholder="">
            </div>
            <div class="form-group">
                <label class="form-label">API Key</label>
                <input type="password" class="form-input" id="apikey" placeholder="">
            </div>
            <div class="form-group">
                <label class="form-label optional-label">重试次数</label>
                <input type="number" class="form-input" id="maxRetries" placeholder="3" min="1" max="20">
            </div>
        </div>
        
        <div class="card">
            <h2 class="card-title">模式选择</h2>
            <div class="mode-switch-container">
                <span class="mode-switch-label">输出模式：</span>
                <div class="mode-switch">
                    <div class="mode-option active" data-mode="skills" onclick="switchMode('skills')">Skills</div>
                    <div class="mode-option" data-mode="chara_card" onclick="switchMode('chara_card')">角色卡</div>
                </div>
                <span class="mode-description" id="modeDescription">生成技能文件夹，用于AI工具/智能体</span>
            </div>
        </div>
        
        <div class="card">
            <h2 class="card-title">文件选择</h2>
            
            <div class="form-group">
                <label class="form-label">选择文件（按点击顺序合并）</label>
                <div id="fileList" class="file-list">
                    <div class="file-list-empty">扫描中...</div>
                </div>
                <div class="selected-files-info" id="selectedFilesInfo">
                    <span>已选择: 0 个文件</span>
                    <button class="btn btn-secondary btn-small" onclick="clearSelectedFiles()">清空选择</button>
                </div>
            </div>
            
            <div class="token-info empty" id="tokenInfo">未选择文件</div>
            
            <div class="form-group" style="margin-top: 16px;">
                <label class="form-label">切片大小 (k tokens)</label>
                <input type="number" class="form-input" id="sliceSize" placeholder="50" min="1" max="500" value="50" style="width: 120px;" oninput="onSliceSizeChange()">
                <span style="color: #718096; font-size: 0.85rem; margin-left: 8px;">每多少k tokens切一次片，默认50k</span>
            </div>
            
            <div class="section-divider"></div>
            
            <div class="form-group">
                <label class="form-label optional-label">输出语言</label>
                <select class="form-input" id="outputLanguage">
                    <option value="">自动检测（跟随原文）</option>
                    <option value="zh">中文</option>
                    <option value="en">English</option>
                    <option value="ja">日本語</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label optional-label">VNDB 角色ID</label>
                <div class="flex-row">
                    <input type="text" class="form-input" id="vndbId" placeholder="例如: c12345 或 12345" style="flex: 1;">
                    <button class="btn btn-secondary" onclick="fetchVNDBInfo()">获取信息</button>
                </div>
            </div>
            <div id="vndbInfo" class="vndb-section hidden">
                <div class="vndb-info" id="vndbInfoContent"></div>
            </div>
        </div>
        
        <div class="card">
            <h2 class="card-title">角色分析</h2>
            <div class="form-group">
                <label class="form-label">角色名称</label>
                <input type="text" class="form-input" id="roleName" placeholder="输入要分析的角色名称">
            </div>
            
            <div class="form-group">
                <label class="form-label optional-label">补充说明</label>
                <textarea class="form-input" id="instruction" placeholder="输入任何特定的分析指令..."></textarea>
            </div>
            
            <div class="form-group">
                <label class="form-label">并发数量</label>
                <input type="number" class="form-input" id="concurrency" placeholder="1" min="1" max="10" value="1">
            </div>
            <button class="btn btn-primary" onclick="startSummarize()">
                <span class="spinner"></span>
                <span>开始归纳</span>
            </button>
        </div>
        
        <div class="card">
            <h2 class="card-title">生成</h2>
            <p class="description" id="generateDescription">基于归纳结果生成结构化的技能文件夹</p>
            <div class="form-group">
                <label class="form-label">选择角色</label>
                <select class="form-input" id="roleSelect" onchange="onRoleSelectChange()">
                    <option value="">请选择角色...</option>
                </select>
            </div>
            
            <div id="creatorSection" class="hidden">
                <div class="form-group">
                    <label class="form-label optional-label">创作者名称</label>
                    <input type="text" class="form-input" id="creator" placeholder="输入创作者名称">
                </div>
            </div>
            
            <div class="compression-switch">
                <span class="compression-switch-label">压缩模式：</span>
                <div class="compression-options">
                    <div class="compression-option active" data-mode="original" onclick="switchCompressionMode('original')">传统压缩</div>
                    <div class="compression-option" data-mode="llm" onclick="switchCompressionMode('llm')">LLM去重</div>
                </div>
                <span class="compression-description" id="compressionDescription">使用头尾加权策略压缩摘要</span>
            </div>
            
            <div class="form-group" style="margin-top: 15px;">
                <label class="form-label" style="display: flex; align-items: center; cursor: pointer;">
                    <input type="checkbox" id="forceNoCompression" style="margin-right: 8px; width: auto;">
                    <span>强制不压缩（即使超出上下文限制也使用完整内容）</span>
                </label>
                <span style="font-size: 0.85rem; color: #718096; margin-left: 24px; display: block; margin-top: 4px;">
                    警告：启用此选项可能导致请求超出模型的上下文窗口限制
                </span>
            </div>
            
            <div class="token-info" id="generationTokenInfo" style="margin: 12px 0; padding: 10px; background: #f7fafc; border-radius: 6px; font-size: 0.9rem;">
                <span style="color: #718096;">请选择角色查看归纳统计</span>
            </div>
            
            <button class="btn btn-primary" onclick="generateSkills()">
                <span class="spinner"></span>
                <span id="generateButtonText">生成技能文件夹</span>
            </button>
        </div>
        
        <div class="card" id="checkpointCard" style="display: none;">
            <h2 class="card-title">任务记录</h2>
            <p class="description">查看和恢复中断的任务</p>
            <div id="checkpointList" style="margin: 12px 0;"></div>
        </div>

        <div class="card">
            <h2 class="card-title">活动日志</h2>
            <div class="log-container">
                <div class="log-content" id="logContent">
                    <div class="log-line">等待操作...</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let currentFile = '';
        let selectedFiles = [];
        let previousFiles = [];
        let currentMode = 'skills';
        let compressionMode = 'original';
        let vndbData = null;
        let fileTokenCache = {};
        
        function log(message, type = 'normal') {
            const logContent = document.getElementById('logContent');
            const timestamp = new Date().toLocaleTimeString('zh-CN', { hour12: false });
            const line = document.createElement('div');
            line.className = `log-line ${type}`;
            line.textContent = `[${timestamp}] ${message}`;
            logContent.appendChild(line);
            logContent.scrollTop = logContent.scrollHeight;
        }
        
        function setLoading(btn, loading) {
            btn.disabled = loading;
            btn.classList.toggle('loading', loading);
        }
        
        function switchMode(mode) {
            currentMode = mode;

            document.querySelectorAll('.mode-option').forEach(el => {
                el.classList.toggle('active', el.dataset.mode === mode);
            });

            const descEl = document.getElementById('modeDescription');
            const genDescEl = document.getElementById('generateDescription');
            const genBtnText = document.getElementById('generateButtonText');

            if (mode === 'skills') {
                descEl.textContent = '生成技能文件夹，用于AI工具/智能体';
                genDescEl.textContent = '基于归纳结果生成结构化的技能文件夹';
                genBtnText.textContent = '生成技能文件夹';
            } else {
                descEl.textContent = '生成SillyTavern角色卡JSON文件';
                genDescEl.textContent = '基于归纳结果生成SillyTavern角色卡';
                genBtnText.textContent = '生成角色卡';
            }

            const skillsOnlySection = document.getElementById('skillsOnlySection');
            if (skillsOnlySection) {
                skillsOnlySection.classList.toggle('hidden', mode !== 'skills');
            }
            document.getElementById('creatorSection').classList.toggle('hidden', mode !== 'chara_card');

            // 重置token信息显示
            document.getElementById('generationTokenInfo').innerHTML = '<span style="color: #718096;">请选择角色查看归纳统计</span>';
            document.getElementById('roleSelect').value = '';

            scanRoles();

            log(`→ 切换到模式: ${mode === 'skills' ? 'Skills' : '角色卡'}`, 'info');
        }
        
        function switchCompressionMode(mode) {
            compressionMode = mode;
            
            document.querySelectorAll('.compression-option').forEach(el => {
                el.classList.toggle('active', el.dataset.mode === mode);
            });
            
            const descEl = document.getElementById('compressionDescription');
            if (mode === 'original') {
                descEl.textContent = '使用头尾加权策略压缩摘要';
            } else {
                descEl.textContent = '使用LLM智能去重，实验性功能，极慢';
            }
            
            log(`→ 切换到压缩模式: ${mode === 'original' ? '传统压缩' : 'LLM去重'}`, 'info');
        }
        
        async function fetchVNDBInfo() {
            const vndbId = document.getElementById('vndbId').value.trim();
            if (!vndbId) {
                log('⚠ 请输入VNDB ID', 'warning');
                return;
            }
            
            log(`→ 正在获取VNDB信息: ${vndbId}...`, 'info');
            
            try {
                const response = await fetch('/api/vndb', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ vndb_id: vndbId })
                });
                const result = await response.json();
                
                if (result.success) {
                    vndbData = result.data;
                    displayVNDBInfo(vndbData);
                    log(`✓ 成功获取角色信息: ${vndbData.name}`, 'success');
                } else {
                    log(`✗ ${result.message}`, 'error');
                    vndbData = null;
                    document.getElementById('vndbInfo').classList.add('hidden');
                }
            } catch (e) {
                log(`✗ 错误: ${e.message}`, 'error');
                vndbData = null;
            }
        }
        
        function displayVNDBInfo(data) {
            const container = document.getElementById('vndbInfoContent');
            let html = '';

            if (data.image_url) html += `<div class="vndb-info-item" style="text-align: center; margin-bottom: 12px;"><img src="${data.image_url}" style="max-width: 120px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.15);" alt="Character portrait" /></div>`;

            if (data.name) html += `<div class="vndb-info-item"><span class="vndb-info-label">名称:</span> <span class="vndb-info-value">${data.name}</span></div>`;
            if (data.original_name) html += `<div class="vndb-info-item"><span class="vndb-info-label">原名:</span> <span class="vndb-info-value">${data.original_name}</span></div>`;
            if (data.aliases && data.aliases.length > 0) html += `<div class="vndb-info-item"><span class="vndb-info-label">别名:</span> <span class="vndb-info-value">${data.aliases.join(', ')}</span></div>`;
            if (data.age) html += `<div class="vndb-info-item"><span class="vndb-info-label">年龄:</span> <span class="vndb-info-value">${data.age}</span></div>`;
            if (data.birthday) html += `<div class="vndb-info-item"><span class="vndb-info-label">生日:</span> <span class="vndb-info-value">${data.birthday}</span></div>`;
            if (data.blood_type) html += `<div class="vndb-info-item"><span class="vndb-info-label">血型:</span> <span class="vndb-info-value">${data.blood_type}</span></div>`;

            if (data.height) html += `<div class="vndb-info-item"><span class="vndb-info-label">身高:</span> <span class="vndb-info-value">${data.height}cm</span></div>`;
            if (data.weight) html += `<div class="vndb-info-item"><span class="vndb-info-label">体重:</span> <span class="vndb-info-value">${data.weight}kg</span></div>`;
            if (data.bust && data.waist && data.hips) html += `<div class="vndb-info-item"><span class="vndb-info-label">三围:</span> <span class="vndb-info-value">${data.bust}-${data.waist}-${data.hips}cm</span></div>`;

            if (data.traits && data.traits.length > 0) {
                html += `<div class="vndb-info-item"><span class="vndb-info-label">特征 (${data.traits.length}个):</span> <span class="vndb-info-value">${data.traits.join(', ')}</span></div>`;
            }

            if (data.vns && data.vns.length > 0) {
                html += `<div class="vndb-info-item"><span class="vndb-info-label">所属游戏 (${data.vns.length}个):</span> <span class="vndb-info-value">${data.vns.join(', ')}</span></div>`;
            }

            if (data.description) {
                html += `<div class="vndb-info-item"><span class="vndb-info-label">描述:</span> <span class="vndb-info-value">${data.description}</span></div>`;
            }

            container.innerHTML = html;
            document.getElementById('vndbInfo').classList.remove('hidden');
        }
        
        async function scanFiles() {
            try {
                const response = await fetch('/api/files');
                const result = await response.json();
                
                const filesChanged = JSON.stringify(result.files) !== JSON.stringify(previousFiles);
                previousFiles = result.files;
                
                if (filesChanged) {
                    renderFileList(result.files);
                    
                    if (result.success && result.files.length > 0) {
                        log(`✓ 扫描完成，找到 ${result.files.length} 个文件`, 'success');
                    }
                }
            } catch (e) {
                log(`✗ 扫描错误: ${e.message}`, 'error');
            }
        }
        
        function renderFileList(files) {
            const fileList = document.getElementById('fileList');
            
            if (!files || files.length === 0) {
                fileList.innerHTML = '<div class="file-list-empty">resource 目录中没有 .txt 文件</div>';
                return;
            }
            
            fileList.innerHTML = '';
            files.forEach((file, index) => {
                const fileItem = document.createElement('div');
                fileItem.className = 'file-item';
                fileItem.dataset.path = file;
                fileItem.onclick = () => toggleFileSelection(file);
                
                const orderIndex = selectedFiles.indexOf(file);
                const isSelected = orderIndex !== -1;
                
                if (isSelected) {
                    fileItem.classList.add('selected');
                }
                
                const orderNum = isSelected ? orderIndex + 1 : '';
                const tokenCount = fileTokenCache[file] || 0;
                const tokenDisplay = tokenCount > 0 ? `(${(tokenCount/1000).toFixed(1)}k tokens)` : '';
                
                fileItem.innerHTML = `
                    <span class="file-order">${orderNum}</span>
                    <span class="file-name">${file.split('\\').pop()}</span>
                    <span class="file-token-count">${tokenDisplay}</span>
                `;
                
                fileList.appendChild(fileItem);
            });
        }
        
        async function toggleFileSelection(filePath) {
            const index = selectedFiles.indexOf(filePath);
            
            if (index === -1) {
                selectedFiles.push(filePath);
                await fetchFileTokenCount(filePath);
            } else {
                selectedFiles.splice(index, 1);
            }
            
            updateSelectedFilesUI();
            renderFileList(previousFiles);
            
            if (selectedFiles.length > 0) {
                await calculateTotalTokens();
            } else {
                document.getElementById('tokenInfo').textContent = '未选择文件';
                document.getElementById('tokenInfo').className = 'token-info empty';
                currentFile = '';
            }
        }
        
        async function fetchFileTokenCount(filePath) {
            if (fileTokenCache[filePath]) return;
            
            try {
                const response = await fetch('/api/files/tokens', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ file_path: filePath, slice_size_k: 50 })
                });
                const result = await response.json();
                
                if (result.success) {
                    fileTokenCache[filePath] = result.token_count;
                    renderFileList(previousFiles);
                }
            } catch (e) {
                console.error('Failed to fetch token count:', e);
            }
        }
        
        async function calculateTotalTokens() {
            if (selectedFiles.length === 0) return;
            
            const sliceSizeK = parseInt(document.getElementById('sliceSize').value) || 50;
            let totalTokens = 0;
            
            for (const file of selectedFiles) {
                if (!fileTokenCache[file]) {
                    await fetchFileTokenCount(file);
                }
                totalTokens += fileTokenCache[file] || 0;
            }
            
            const sliceCount = Math.floor(totalTokens / (sliceSizeK * 1000)) + 1;
            
            document.getElementById('tokenInfo').textContent = 
                `📊 总Token: ${totalTokens.toLocaleString()}  |  切片数: ${sliceCount} (${sliceSizeK}k/片)  |  文件数: ${selectedFiles.length}`;
            document.getElementById('tokenInfo').className = 'token-info';
            
            currentFile = selectedFiles[0];
        }
        
        function updateSelectedFilesUI() {
            const info = document.getElementById('selectedFilesInfo');
            info.querySelector('span').textContent = `已选择: ${selectedFiles.length} 个文件`;
        }
        
        function onSliceSizeChange() {
            // 当切片大小改变时，重新计算token信息
            if (selectedFiles.length > 0) {
                calculateTotalTokens();
            }
        }
        
        async function onRoleSelectChange() {
            const roleName = document.getElementById('roleSelect').value;
            const tokenInfoEl = document.getElementById('generationTokenInfo');
            
            if (!roleName) {
                tokenInfoEl.innerHTML = '<span style="color: #718096;">请选择角色查看归纳统计</span>';
                return;
            }
            
            tokenInfoEl.innerHTML = '<span style="color: #718096;">正在计算...</span>';
            
            try {
                // 获取角色的归纳文件
                const response = await fetch('/api/summaries/files', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        role_name: roleName,
                        mode: currentMode
                    })
                });
                const result = await response.json();
                
                if (!result.success || !result.files || result.files.length === 0) {
                    tokenInfoEl.innerHTML = '<span style="color: #e53e3e;">未找到归纳文件</span>';
                    return;
                }
                
                // 计算总token数
                let totalTokens = 0;
                for (const file of result.files) {
                    const tokenResponse = await fetch('/api/files/tokens', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ file_path: file })
                    });
                    const tokenResult = await tokenResponse.json();
                    if (tokenResult.success) {
                        totalTokens += tokenResult.token_count;
                    }
                }
                
                const contextResponse = await fetch('/api/context-limit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model_name: document.getElementById('modelname').value })
                });
                const contextResult = await contextResponse.json();
                const contextLimit = (contextResult.success && contextResult.context_limit) ? contextResult.context_limit : 115000;
                
                const willCompress = totalTokens > contextLimit;
                const compressionText = willCompress 
                    ? `<span style="color: #e53e3e; font-weight: 600;">将触发压缩</span>` 
                    : '<span style="color: #38a169;">无需压缩</span>';
                
                const unknownModelWarning = (contextLimit === 115000)
                    ? '<div style="margin-top: 4px; color: #d69e2e; font-size: 0.85rem;">⚠ 未知的模型！请确认你的模型名称填写正确，如确认只是程序误报可忽略这条信息。</div>'
                    : '';
                
                tokenInfoEl.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span>📊 归纳总Token: <strong>${totalTokens.toLocaleString()}</strong></span>
                        <span>限制: ${contextLimit.toLocaleString()}</span>
                    </div>
                    <div style="margin-top: 6px; padding-top: 6px; border-top: 1px solid #e2e8f0;">
                        ${compressionText} 
                        <span style="color: #718096; font-size: 0.85rem;">(${result.files.length} 个归纳文件)</span>
                    </div>
                    ${unknownModelWarning}
                `;
            } catch (e) {
                tokenInfoEl.innerHTML = `<span style="color: #e53e3e;">计算失败: ${e.message}</span>`;
            }
        }
        
        function clearSelectedFiles() {
            selectedFiles = [];
            updateSelectedFilesUI();
            renderFileList(previousFiles);
            document.getElementById('tokenInfo').textContent = '未选择文件';
            document.getElementById('tokenInfo').className = 'token-info empty';
            currentFile = '';
            log('✓ 已清空文件选择', 'info');
        }
        
        setInterval(scanFiles, 5000);
        
        scanFiles();
        
        async function scanRoles() {
            try {
                const response = await fetch('/api/summaries/roles');
                const result = await response.json();

                const select = document.getElementById('roleSelect');
                const currentValue = select.value;

                select.innerHTML = '<option value="">请选择角色...</option>';

                if (result.success) {
                    let availableRoles = [];
                    if (currentMode === 'chara_card') {
                        availableRoles = result.chara_card_roles || [];
                    } else {
                        availableRoles = result.skills_roles || [];
                    }

                    if (availableRoles.length > 0) {
                        availableRoles.forEach(role => {
                            const option = document.createElement('option');
                            option.value = role;
                            option.textContent = role;
                            select.appendChild(option);
                        });

                        if (currentValue && availableRoles.includes(currentValue)) {
                            select.value = currentValue;
                        }
                    }
                }
            } catch (e) {
            }
        }
        
        setInterval(scanRoles, 5000);
        
        scanRoles();
        

        
        function getConfig() {
            const baseurl = document.getElementById('baseurl').value;
            const modelname = document.getElementById('modelname').value;
            const apikey = document.getElementById('apikey').value;
            const maxRetries = parseInt(document.getElementById('maxRetries').value) || 0;
            
            return {
                baseurl: baseurl,
                modelname: modelname,
                apikey: apikey,
                max_retries: maxRetries
            };
        }
        
        async function startSummarize() {
            const roleName = document.getElementById('roleName').value;
            const concurrency = parseInt(document.getElementById('concurrency').value) || 1;
            const sliceSizeK = parseInt(document.getElementById('sliceSize').value) || 50;
            
            if (!roleName) {
                log('⚠ 请输入角色名称', 'warning');
                return;
            }
            
            if (selectedFiles.length === 0) {
                log('⚠ 请先选择文件', 'warning');
                return;
            }
            
            const btn = event.target.closest('button');
            setLoading(btn, true);
            log(`→ 开始为角色归纳: ${roleName} (模式: ${currentMode === 'skills' ? 'Skills' : '角色卡'}, 并发: ${concurrency}, 文件数: ${selectedFiles.length})`, 'info');
            
            try {
                log('→ 正在合并并切片文件...', 'info');
                const sliceResponse = await fetch('/api/slice', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        file_paths: selectedFiles, 
                        slice_size_k: sliceSizeK 
                    })
                });
                const sliceResult = await sliceResponse.json();
                
                if (!sliceResult.success) {
                    log(`✗ 切片失败: ${sliceResult.message}`, 'error');
                    setLoading(btn, false);
                    return;
                }
                
                log(`✓ ${sliceResult.message}`, 'success');
                
                const requestData = {
                    role_name: roleName,
                    file_paths: selectedFiles,
                    concurrency: concurrency,
                    mode: currentMode,
                    slice_size_k: sliceSizeK,
                    output_language: document.getElementById('outputLanguage').value,
                    vndb_data: vndbData,
                    ...getConfig()
                };
                
                requestData.instruction = document.getElementById('instruction').value;
                
                const response = await fetch('/api/summarize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestData)
                });
                const result = await response.json();
                
                if (result.success) {
                    log(`✓ 归纳完成，共处理 ${result.slice_count} 个切片`, 'success');
                } else {
                    log(`✗ ${result.message}`, 'error');
                }
                
                if (result.errors && result.errors.length > 0) {
                    result.errors.forEach(e => log(`  ${e}`, 'error'));
                }
            } catch (e) {
                log(`✗ 错误: ${e.message}`, 'error');
            }
            
            setLoading(btn, false);
        }
        
        async function generateSkills() {
            const roleName = document.getElementById('roleSelect').value;
            
            if (!roleName) {
                log('⚠ 请先选择角色', 'warning');
                return;
            }
            
            const btn = event.target.closest('button');
            setLoading(btn, true);
            log(`→ 开始为角色 "${roleName}" 生成${currentMode === 'skills' ? '技能文件夹' : '角色卡'}...`, 'info');
            
            try {
                const requestData = {
                    role_name: roleName,
                    mode: currentMode,
                    output_language: document.getElementById('outputLanguage').value,
                    vndb_data: vndbData,
                    compression_mode: compressionMode,
                    force_no_compression: document.getElementById('forceNoCompression').checked,
                    ...getConfig()
                };
                
                if (currentMode === 'chara_card') {
                    requestData.creator = document.getElementById('creator').value;
                }
                
                const response = await fetch('/api/skills', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestData)
                });
                const result = await response.json();
                
                if (result.results) {
                    result.results.forEach(r => log(`  ${r}`, 'info'));
                }
                
                if (result.success) {
                    log(`✓ ${currentMode === 'skills' ? '技能文件夹' : '角色卡'}生成完成`, 'success');
                    if (result.output_path) {
                        log(`  JSON路径: ${result.output_path}`, 'info');
                    }
                    if (result.image_path) {
                        log(`  图片路径: ${result.image_path}`, 'info');
                    }
                    if (result.png_path) {
                        log(`  PNG角色卡: ${result.png_path}`, 'info');
                        log(`  (可直接导入SillyTavern)`, 'success');
                    }
                    if (result.conversion_error) {
                        log(`  图片转换问题: ${result.conversion_error}`, 'warning');
                    }
                    if (result.warning) {
                        log(`  警告: ${result.warning}`, 'warning');
                    }
                } else {
                    log(`✗ ${result.message}`, 'error');
                }
            } catch (e) {
                log(`✗ 错误: ${e.message}`, 'error');
            }
            
            setLoading(btn, false);
        }
        
        const taskTypeNames = {
            'summarize': '归纳',
            'generate_skills': '生成技能',
            'generate_chara_card': '生成角色卡'
        };
        
        async function refreshCheckpoints() {
            const container = document.getElementById('checkpointList');
            const card = document.getElementById('checkpointCard');
            
            try {
                const response = await fetch('/api/checkpoints');
                const result = await response.json();
                
                if (!result.success || !result.checkpoints || result.checkpoints.length === 0) {
                    card.style.display = 'none';
                    container.innerHTML = '';
                    return;
                }
                
                card.style.display = '';
                container.innerHTML = '';
                result.checkpoints.forEach(ckpt => {
                    const typeName = taskTypeNames[ckpt.task_type] || ckpt.task_type;
                    const roleName = ckpt.input_params?.role_name || '未知';
                    const statusClass = ckpt.status;
                    const statusText = ckpt.status === 'running' ? '运行中' : 
                                       ckpt.status === 'failed' ? '已中断' : '已完成';
                    
                    const item = document.createElement('div');
                    item.className = 'checkpoint-item';
                    item.innerHTML = `
                        <div class="ckpt-header">
                            <span class="ckpt-type">${typeName} - ${roleName}</span>
                            <span class="ckpt-status ${statusClass}">${statusText}</span>
                        </div>
                        <div class="ckpt-info">
                            创建: ${new Date(ckpt.created_at).toLocaleString('zh-CN')}
                            ${ckpt.progress?.current_phase ? ' | 阶段: ' + ckpt.progress.current_phase : ''}
                        </div>
                        <div class="ckpt-actions">
                            ${ckpt.status !== 'completed' ? `<button class="btn-sm btn-resume" onclick="resumeCheckpoint('${ckpt.checkpoint_id}')">恢复</button>` : ''}
                            <button class="btn-sm btn-delete" onclick="deleteCheckpoint('${ckpt.checkpoint_id}')">删除</button>
                        </div>
                    `;
                    container.appendChild(item);
                });
            } catch (e) {
                card.style.display = 'none';
            }
        }
        
        async function resumeCheckpoint(checkpointId) {
            log(`→ 正在恢复任务: ${checkpointId}`, 'info');
            
            try {
                const baseurl = document.getElementById('baseurl').value;
                const modelname = document.getElementById('modelname').value;
                const apikey = document.getElementById('apikey').value;
                const concurrency = parseInt(document.getElementById('concurrency').value) || 1;
                const maxRetries = parseInt(document.getElementById('maxRetries').value) || 0;

                const response = await fetch(`/api/checkpoints/${checkpointId}/resume`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        baseurl: baseurl,
                        modelname: modelname,
                        apikey: apikey,
                        concurrency: concurrency,
                        max_retries: maxRetries
                    })
                });
                const result = await response.json();
                
                if (result.success) {
                    log(`✓ 任务恢复完成`, 'success');
                    if (result.output_path) {
                        log(`  输出路径: ${result.output_path}`, 'info');
                    }
                } else {
                    log(`✗ 恢复失败: ${result.message}`, 'error');
                }
            } catch (e) {
                log(`✗ 恢复错误: ${e.message}`, 'error');
            }
            
            refreshCheckpoints();
        }
        
        async function deleteCheckpoint(checkpointId) {
            if (!confirm('确定要删除此任务记录吗？')) return;
            
            try {
                const response = await fetch(`/api/checkpoints/${checkpointId}`, {
                    method: 'DELETE'
                });
                const result = await response.json();
                
                if (result.success) {
                    log(`✓ 任务已删除`, 'success');
                } else {
                    log(`✗ 删除失败: ${result.message}`, 'error');
                }
            } catch (e) {
                log(`✗ 删除错误: ${e.message}`, 'error');
            }
            
            refreshCheckpoints();
        }

        let _checkpointRefreshTimer = null;

        function startCheckpointAutoRefresh(intervalMs = 5000) {
            stopCheckpointAutoRefresh();
            refreshCheckpoints();
            _checkpointRefreshTimer = setInterval(refreshCheckpoints, intervalMs);
        }

        function stopCheckpointAutoRefresh() {
            if (_checkpointRefreshTimer) {
                clearInterval(_checkpointRefreshTimer);
                _checkpointRefreshTimer = null;
            }
        }

        startCheckpointAutoRefresh();
    </script>
</body>
</html>
